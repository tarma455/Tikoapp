<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<meta name="theme-color" content="#1e3a8a">

<title>TIKO App - Control Total</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

:root{

    --p:#1e3a8a;
    --s:#2563eb;
    --bg:#f8fafc;

}

body{

    font-family:'Segoe UI',sans-serif;
    background:var(--bg);
    margin:0;
    padding:0;
    color:#333;

}

.screen{

    display:none;
    padding:20px;
    max-width:450px;
    margin:auto;
    animation:fadeIn .3s;

}

.active{

    display:block;

}

@keyframes fadeIn{

    from{opacity:0;}
    to{opacity:1;}

}

.card{

    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
    margin-bottom:20px;

}

h2{

    color:var(--p);
    text-align:center;
    margin-bottom:20px;

}

input{

    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
    font-size:15px;
    transition:.2s;

}

input:focus{

    outline:none;
    border-color:#2563eb;

}

button{

    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:var(--p);
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    transition:.2s;
    font-size:15px;

}

button:active{

    transform:scale(.98);

}

.btn-sec{

    background:var(--s);

}

.btn-back{

    background:#64748b;
    margin-top:20px;

}

.item{

    padding:10px;
    border-bottom:1px solid #eee;
    font-size:14px;
    display:flex;
    justify-content:space-between;

}

.nav-grid{

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;

}

.small{

    text-align:center;
    font-size:13px;
    opacity:.7;

}

#qrcode canvas{

    border-radius:10px;

}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="scr-login" class="screen active">

    <h2>🐾 TIKO LOGIN</h2>

    <div class="card">

        <input
        type="email"
        id="login-email"
        placeholder="Correo electrónico">

        <input
        type="password"
        id="login-pass"
        placeholder="Contraseña">

        <button onclick="login()">
            Iniciar Sesión
        </button>

        <button class="btn-sec" onclick="register()">
            Registrarse
        </button>

        <p class="small">
            Tu sesión permanecerá iniciada
        </p>

    </div>

</div>

<!-- HOME -->

<div id="scr-home" class="screen">

    <h2>
        ¡Hola,
        <span id="display-name"></span>!
    </h2>

    <div class="nav-grid">

        <button onclick="show('scr-mascota')">
            🐶 Mascota
        </button>

        <button onclick="show('scr-vacunas')">
            💉 Vacunas
        </button>

        <button onclick="show('scr-historial')">
            🩺 Historial
        </button>

        <button onclick="renderCartilla()">
            📋 Cartilla
        </button>

        <button class="btn-sec" onclick="generateQR()">
            📱 QR
        </button>

    </div>

    <button class="btn-back" onclick="logout()">
        Cerrar Sesión
    </button>

</div>

<!-- MASCOTA -->

<div id="scr-mascota" class="screen">

    <h2>Datos de Mascota</h2>

    <div class="card">

        <input type="text"
        id="m-nom"
        placeholder="Nombre">

        <input type="text"
        id="m-esp"
        placeholder="Especie">

        <input type="number"
        id="m-edad"
        placeholder="Edad">

        <input type="tel"
        id="m-tel"
        placeholder="Teléfono de contacto">

        <button onclick="saveMascota()">
            Guardar Datos
        </button>

    </div>

    <button class="btn-back"
    onclick="show('scr-home')">

        Volver

    </button>

</div>

<!-- VACUNAS -->

<div id="scr-vacunas" class="screen">

    <h2>Registrar Vacuna</h2>

    <div class="card">

        <input type="text"
        id="v-nom"
        placeholder="Vacuna">

        <input type="date"
        id="v-fec">

        <button onclick="addVacuna()">
            Añadir
        </button>

        <div id="list-v"
        style="margin-top:15px">

        </div>

    </div>

    <button class="btn-back"
    onclick="show('scr-home')">

        Volver

    </button>

</div>

<!-- HISTORIAL -->

<div id="scr-historial" class="screen">

    <h2>Historial Médico</h2>

    <div class="card">

        <input type="text"
        id="h-enf"
        placeholder="Enfermedad">

        <input type="date"
        id="h-fec">

        <button onclick="addHistorial()">
            Añadir Registro
        </button>

        <div id="list-h"
        style="margin-top:15px">

        </div>

    </div>

    <button class="btn-back"
    onclick="show('scr-home')">

        Volver

    </button>

</div>

<!-- CARTILLA -->

<div id="scr-cartilla" class="screen">

    <div id="pdf-area"
    style="
    background:white;
    padding:20px;
    border-radius:10px;
    ">

        <h1 style="
        text-align:center;
        color:#1e3a8a;
        border-bottom:3px solid #1e3a8a;">

            CARTILLA VETERINARIA

        </h1>

        <div id="c-mascota"
        style="
        margin:20px 0;
        line-height:1.6;
        ">

        </div>

        <h3 style="
        background:#f1f5f9;
        padding:5px;
        ">

            💉 REGISTRO DE VACUNACIÓN

        </h3>

        <div id="c-vacunas"></div>

        <h3 style="
        background:#f1f5f9;
        padding:5px;
        ">

            🩺 HISTORIAL DE ENFERMEDADES

        </h3>

        <div id="c-historial"></div>

    </div>

    <button class="btn-back"
    onclick="show('scr-home')">

        Volver

    </button>

</div>

<!-- QR -->

<div id="scr-qr" class="screen">

    <h2>QR de la Mascota</h2>

    <div class="card">

        <div id="qrcode"
        style="
        display:flex;
        justify-content:center;
        margin:20px 0;
        ">

        </div>

        <p style="text-align:center">

            Escanea este QR para abrir
            la cartilla digital actualizada

        </p>

    </div>

    <button class="btn-back"
    onclick="show('scr-home')">

        Volver

    </button>

</div>

<script>

// FIREBASE CONFIG

const firebaseConfig = {

  apiKey: "AIzaSyANX656iqyz6NIo7WX_IvIMnY4w9SQP6sU",

  authDomain: "tiko-ap.firebaseapp.com",

  databaseURL: "https://tiko-ap-default-rtdb.firebaseio.com",

  projectId: "tiko-ap",

  storageBucket: "tiko-ap.firebasestorage.app",

  messagingSenderId: "97455117291",

  appId: "1:97455117291:web:1dc88f792d0a74c394bfae"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let currentUser = null;

// SESIÓN PERSISTENTE

firebase.auth()

.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// DETECTAR SESIÓN

firebase.auth().onAuthStateChanged((user)=>{

    if(user){

        currentUser = user;

        document.getElementById('display-name')
        .innerText = user.email;

        show('scr-home');

    }else{

        show('scr-login');

    }

});

// CAMBIAR PANTALLA

function show(id){

    document
    .querySelectorAll('.screen')
    .forEach(s=>s.classList.remove('active'));

    document
    .getElementById(id)
    .classList.add('active');

    if(id==='scr-vacunas'){

        loadList('vacunas','list-v');

    }

    if(id==='scr-historial'){

        loadList('historial','list-h');

    }

}

// REGISTRO

function register(){

    const email =
    document.getElementById('login-email')
    .value.trim();

    const pass =
    document.getElementById('login-pass')
    .value.trim();

    if(!email || !pass){

        alert("Completa todos los campos");
        return;

    }

    firebase.auth()

    .createUserWithEmailAndPassword(email,pass)

    .then(()=>{

        alert("Cuenta creada correctamente");

    })

    .catch((error)=>{

        alert(error.message);

    });

}

// LOGIN

function login(){

    const email =
    document.getElementById('login-email')
    .value.trim();

    const pass =
    document.getElementById('login-pass')
    .value.trim();

    firebase.auth()

    .signInWithEmailAndPassword(email,pass)

    .catch((error)=>{

        alert(error.message);

    });

}

// LOGOUT

function logout(){

    firebase.auth().signOut();

}

// GUARDAR DATOS

function saveMascota(){

    const data = {

        nombre:
        document.getElementById('m-nom').value,

        especie:
        document.getElementById('m-esp').value,

        edad:
        document.getElementById('m-edad').value,

        telefono:
        document.getElementById('m-tel').value

    };

    db.ref('usuarios/' + currentUser.uid)

    .update({

        mascota:data

    })

    .then(()=>{

        alert("Datos guardados");

    });

}

// AÑADIR VACUNA

function addVacuna(){

    const v = {

        nom:
        document.getElementById('v-nom').value,

        fec:
        document.getElementById('v-fec').value

    };

    db.ref('usuarios/' + currentUser.uid + '/vacunas')

    .push(v)

    .then(()=>{

        document.getElementById('v-nom').value='';

        loadList('vacunas','list-v');

    });

}

// AÑADIR HISTORIAL

function addHistorial(){

    const h = {

        enf:
        document.getElementById('h-enf').value,

        fec:
        document.getElementById('h-fec').value

    };

    db.ref('usuarios/' + currentUser.uid + '/historial')

    .push(h)

    .then(()=>{

        document.getElementById('h-enf').value='';

        loadList('historial','list-h');

    });

}

// CARGAR LISTAS

function loadList(path,divId){

    db.ref('usuarios/' + currentUser.uid + '/' + path)

    .once('value',(snap)=>{

        let html='';

        snap.forEach(child=>{

            const d = child.val();

            html += `

            <div class="item">

                <span>
                    ${d.nom || d.enf}
                </span>

                <span>
                    ${d.fec}
                </span>

            </div>

            `;

        });

        document.getElementById(divId)
        .innerHTML = html;

    });

}

// VER CARTILLA

function renderCartilla(){

    db.ref('usuarios/' + currentUser.uid)

    .once('value',(snap)=>{

        const data = snap.val() || {};

        const m = data.mascota || {

            nombre:'---',
            especie:'---',
            edad:'---',
            telefono:'---'

        };

        document.getElementById('c-mascota')

        .innerHTML = `

        <p>

        <strong>Correo:</strong>

        ${currentUser.email}

        </p>

        <p>

        <strong>Teléfono:</strong>

        ${m.telefono}

        </p>

        <p>

        <strong>Mascota:</strong>

        ${m.nombre}

        |

        <strong>Especie:</strong>

        ${m.especie}

        |

        <strong>Edad:</strong>

        ${m.edad} años

        </p>

        `;

        let vHtml='';

        if(data.vacunas){

            Object.values(data.vacunas)

            .forEach(v=>{

                vHtml += `

                <div class="item">

                    💉 ${v.nom}

                    <span>${v.fec}</span>

                </div>

                `;

            });

        }

        document.getElementById('c-vacunas')
        .innerHTML = vHtml || 'Sin vacunas';

        let hHtml='';

        if(data.historial){

            Object.values(data.historial)

            .forEach(h=>{

                hHtml += `

                <div class="item">

                    🩺 ${h.enf}

                    <span>${h.fec}</span>

                </div>

                `;

            });

        }

        document.getElementById('c-historial')
        .innerHTML = hHtml || 'Sin registros';

        show('scr-cartilla');

    });

}

// GENERAR QR

function generateQR(){

    show('scr-qr');

    const qrDiv =
    document.getElementById('qrcode');

    qrDiv.innerHTML='';

    const url =

    'https://TUUSUARIO.github.io/TUREPOSITORIO/cartilla.html?id='

    + currentUser.uid;

    new QRCode(qrDiv,{

        text:url,

        width:220,

        height:220

    });

}

</script>

</body>
</html>
