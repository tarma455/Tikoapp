<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0">

<meta name="theme-color"
content="#1e3a8a">

<title>Cartilla TIKO</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>

:root{

    --p:#1e3a8a;
    --bg:#f8fafc;

}

body{

    font-family:'Segoe UI',sans-serif;
    background:var(--bg);
    margin:0;
    padding:20px;
    color:#333;

}

.card{

    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
    max-width:500px;
    margin:auto;

}

h1{

    text-align:center;
    color:var(--p);
    border-bottom:3px solid var(--p);
    padding-bottom:10px;

}

.item{

    padding:10px;
    border-bottom:1px solid #eee;
    display:flex;
    justify-content:space-between;
    font-size:14px;

}

.section{

    margin-top:20px;

}

.section-title{

    background:#f1f5f9;
    padding:8px;
    border-radius:8px;
    font-weight:bold;
    margin-bottom:10px;

}

.center{

    text-align:center;

}

.btn{

    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:var(--p);
    color:white;
    font-weight:bold;
    margin-top:20px;
    cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

    <h1>
        🐾 CARTILLA TIKO
    </h1>

    <div id="infoMascota">

        Cargando información...

    </div>

    <div class="section">

        <div class="section-title">

            💉 REGISTRO DE VACUNACIÓN

        </div>

        <div id="vacunas">

            Sin registros

        </div>

    </div>

    <div class="section">

        <div class="section-title">

            🩺 HISTORIAL MÉDICO

        </div>

        <div id="historial">

            Sin registros

        </div>

    </div>

    <button class="btn"
    onclick="window.print()">

        📄 Descargar / Imprimir Cartilla

    </button>

</div>

<script>

// FIREBASE CONFIG

const firebaseConfig = {

  apiKey: "AIzaSyANX656iqyz6NIo7WX_IvIMnY4w9SQP6sU",

  authDomain: "tiko-ap.firebaseapp.com",

  databaseURL: "https://tiko-ap-default-rtdb.firebaseio.com",

  projectId: "tiko-ap",

  storageBucket: "tiko-ap.firebasestorage.app",

  messagingSenderId: "97455117291",

  appId: "1:97455117291:web:1dc88f792d0a74c394bfae"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

// OBTENER UID DEL QR

const params =
new URLSearchParams(window.location.search);

const uid = params.get('id');

// VALIDAR UID

if(!uid){

    document.body.innerHTML = `

    <div class="card center">

        <h2>
            QR inválido
        </h2>

    </div>

    `;

}else{

    cargarCartilla(uid);

}

// CARGAR CARTILLA

function cargarCartilla(uid){

    db.ref('usuarios/' + uid)

    .once('value',(snap)=>{

        const data = snap.val();

        if(!data){

            document.body.innerHTML = `

            <div class="card center">

                <h2>
                    Cartilla no encontrada
                </h2>

            </div>

            `;

            return;

        }

        const m = data.mascota || {};

        document.getElementById('infoMascota')

        .innerHTML = `

        <p>

        <strong>Mascota:</strong>

        ${m.nombre || '---'}

        </p>

        <p>

        <strong>Especie:</strong>

        ${m.especie || '---'}

        </p>

        <p>

        <strong>Edad:</strong>

        ${m.edad || '---'} años

        </p>

        <p>

        <strong>Teléfono:</strong>

        ${m.telefono || '---'}

        </p>

        `;

        // VACUNAS

        let vacunasHTML = '';

        if(data.vacunas){

            Object.values(data.vacunas)

            .forEach(v=>{

                vacunasHTML += `

                <div class="item">

                    <span>

                    💉 ${v.nom}

                    </span>

                    <span>

                    ${v.fec}

                    </span>

                </div>

                `;

            });

        }

        document.getElementById('vacunas')

        .innerHTML = vacunasHTML || 'Sin vacunas';

        // HISTORIAL

        let historialHTML = '';

        if(data.historial){

            Object.values(data.historial)

            .forEach(h=>{

                historialHTML += `

                <div class="item">

                    <span>

                    🩺 ${h.enf}

                    </span>

                    <span>

                    ${h.fec}

                    </span>

                </div>

                `;

            });

        }

        document.getElementById('historial')

        .innerHTML = historialHTML || 'Sin registros';

    });

}

</script>

</body>
</html>
